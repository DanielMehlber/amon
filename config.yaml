# amon configuration - every key is optional except video_source.config.path.
# Values shown here are the framework defaults (see amon/config.py).

session_name: demo
data_dir: data

video_source:
  class: amon.sources.file.VideoFileSource
  config:
    path: test-video.avi   # change this to your video
    realtime: false        # true paces playback like a live stream

# Live HDMI / capture-card example (uncomment and adjust device):
# video_source:
#   class: amon.sources.hdmi.HdmiCaptureSource
#   config:
#     device: 0              # or /dev/video0 on Linux
#     capture_fourcc: MJPG  # optional; depends on the capture card
#     processing_width: 640   # optional downscale (native size auto-detected)
#     processing_height: 480
#     processing_fps: 10       # optional cap; native rate auto-detected

calibration:
  duration_seconds: 10.0

detectors:
  - class: amon.detectors.temporal.TemporalDetector
    config: {}
  - class: amon.detectors.hud.HudDetector
    config: {}
  - class: amon.detectors.spatial.SpatialDetector
    config: {}

aggregation:
  cooldown_seconds: 1.0
  min_duration_seconds: 0.5
  # Exclusion hierarchy: primary anomalies suppress their side-effects.
  suppresses:
    temporal/flicker: ["*"]
    temporal/noise: ["temporal/contrast", "hud/*", "spatial/*"]
    temporal/contrast: ["hud/*", "spatial/*"]
    hud/*/size: ["hud/*/text", "hud/*/position"]
    hud/*/position: ["hud/*/text"]

media:
  max_clip_seconds: 6.0
  lead_seconds: 1.0
  gif_max_fps: 10.0

report:
  port: 5006
  offline: true          # serve Panel/Bokeh JS/CSS locally (no CDN)
  address: 127.0.0.1       # use 0.0.0.0 to reach the UI from other hosts
  # websocket_origin:      # optional override; localhost + 127.0.0.1 are allowed automatically

export:
  format: html
